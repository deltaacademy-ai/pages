<!DOCTYPE html>
<html lang="pt-BR" data-palette="cream">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel · glauco-teste · Delta Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  [data-palette="forest"]{--bg:#F5F0EB;--white:#FFFFFF;--panel:#FFFFFF;--accent:#5C6C51;--accent2:#1F3331;--accent-light:#EDE8E2;--accent-lighter:#F0EBE4;--accent-border:#DDD8D2;--accent-text:#1F3331;--blue:#2B5B8E;--blue-light:#EAF1F7;--blue-border:#C8D8E5;--blue-text:#1A3D5F;--green:#4F6B3E;--green-light:#ECF2E5;--green-border:#C6D4B3;--green-text:#33491F;--gold:#C8A968;--text:#1A1A1A;--text2:#4A4A4A;--text3:#7A7A7A;--border:#EDE8E2;--border2:#DDD8D2;--ficha-td1-bg:#FAF8F4;--ficha-th-bg:#EDE8E2;--card-num:#C8D1C0;--card-tag-bg:#5C6C51;--card-tag-fg:#F5F0EB;--shadow-xs:0 1px 2px rgba(0,0,0,0.04);--shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)}
  [data-palette="dusk"]{--bg:#141F1D;--white:#1A2927;--panel:#1A2927;--accent:#A4AE9C;--accent2:#D1AA53;--accent-light:#2A433F;--accent-lighter:#223532;--accent-border:#385652;--accent-text:#E3E6DE;--gold:#D1AA53;--text:#ECEAE0;--text2:#C7CEC1;--text3:#8A938F;--border:#2A433F;--border2:#385652;--card-num:#385652;--card-tag-bg:#D1AA53;--card-tag-fg:#141F1D;--shadow-xs:0 1px 2px rgba(0,0,0,0.4);--shadow-sm:0 2px 6px rgba(0,0,0,0.5),0 1px 2px rgba(0,0,0,0.3)}
  [data-palette="cream"]{--bg:#F2ECE0;--white:#FBF7EC;--panel:#FBF7EC;--accent:#8A6E2C;--accent2:#1F3331;--accent-light:#E7DFCE;--accent-lighter:#EFE8D7;--accent-border:#D8CFB7;--accent-text:#1F3331;--gold:#B8933E;--text:#1A1A1A;--text2:#4A4538;--text3:#8A7F64;--border:#E1D8C2;--border2:#D1C7AD;--card-num:#C7BB9D;--card-tag-bg:#1F3331;--card-tag-fg:#F2ECE0;--shadow-xs:0 1px 2px rgba(31,51,49,0.06);--shadow-sm:0 1px 3px rgba(31,51,49,0.08),0 1px 2px rgba(31,51,49,0.05)}
  .palette-switch{position:fixed;top:12px;right:12px;z-index:100;display:inline-flex;gap:3px;background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:3px;box-shadow:var(--shadow-sm);font-family:'Montserrat',system-ui,sans-serif}
  .palette-switch button{font:inherit;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:5px 10px;border-radius:999px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all 160ms ease}
  .palette-switch button:hover{color:var(--text)}
  .palette-switch button.is-active{background:var(--accent2);color:var(--bg)}

  body{font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 24px;-webkit-font-smoothing:antialiased;transition:background 200ms ease,color 200ms ease}
  .container{max-width:600px;margin:0 auto}
  .header-bar{background:var(--accent2);border-radius:14px;padding:26px 28px 22px;margin-bottom:32px}
  .header-bar .label{font-size:0.72rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:6px}
  .header-bar h1{font-size:1.3rem;font-weight:800;color:var(--bg);letter-spacing:0.02em}
  .header-bar p{font-size:0.74rem;color:rgba(242,236,224,0.65);margin-top:4px}
  .section-label{font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);margin:0 0 14px;padding-left:4px}
  .modulo-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow-xs)}
  .modulo-head{background:var(--card-tag-bg);color:var(--card-tag-fg);padding:14px 20px;display:flex;align-items:baseline;justify-content:space-between;gap:12px;cursor:pointer;user-select:none}
  .modulo-head-left{display:flex;align-items:baseline;gap:10px}
  .modulo-head .modulo-title{font-size:0.95rem;font-weight:700;letter-spacing:-0.01em}
  .modulo-head .modulo-meta{font-size:0.68rem;font-weight:600;opacity:0.65}
  .modulo-head .chevron{font-size:0.7rem;opacity:0.7;transition:transform 0.2s}
  .modulo-head.open .chevron{transform:rotate(180deg)}
  .modulo-body{display:none;background:#FFFFFF;border-top:1px solid var(--border)}
  .modulo-body.open{display:block}
  .aula-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 20px;border-bottom:1px solid #F0EBE0}
  .aula-row:last-child{border-bottom:none}
  .aula-info{display:flex;align-items:center;gap:10px}
  .aula-num{font-size:0.68rem;font-weight:800;color:#8A7F64;min-width:22px}
  .aula-title{font-size:0.8rem;font-weight:600;color:#1A1A1A}
  .copy-link-btn{font-family:'Montserrat',system-ui,sans-serif;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--panel);color:var(--accent2);cursor:pointer;transition:all 0.15s;white-space:nowrap}
  .copy-link-btn:hover{background:var(--accent2);color:var(--bg);border-color:var(--accent2)}
  .copy-link-btn.copied{background:var(--accent2);color:var(--bg);border-color:var(--accent2)}
  .footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
  .footer p{font-size:0.68rem;color:var(--text3);line-height:1.7}
  .footer a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<!-- Gate de senha — visível por padrão -->
<div id="gate" style="display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;gap:16px;
  font-family:'Montserrat',sans-serif;background:var(--bg)">
  <div style="background:var(--accent2);border-radius:14px;
    padding:26px 32px;text-align:center;max-width:360px;width:100%">
    <div style="font-size:0.72rem;color:var(--gold);text-transform:uppercase;
      letter-spacing:0.1em;font-weight:600;margin-bottom:8px">Delta Academy</div>
    <div style="font-size:1.1rem;font-weight:800;color:var(--bg);
      letter-spacing:0.02em">Painel do Professor</div>
  </div>
  <input type="password" id="pwd" placeholder="Senha de acesso"
    onkeydown="if(event.key==='Enter')checkPwd()"
    style="padding:10px 16px;border:1px solid var(--border2);border-radius:8px;
    font-size:15px;font-family:'Montserrat',sans-serif;width:260px;
    background:var(--panel);color:var(--text);outline:none">
  <button onclick="checkPwd()"
    style="padding:10px 0;background:var(--accent2);color:var(--bg);border:none;
    border-radius:8px;font-size:14px;font-weight:700;
    font-family:'Montserrat',sans-serif;cursor:pointer;width:260px;
    letter-spacing:0.04em">ENTRAR</button>
  <span id="pwd-error" style="color:#c0392b;font-size:12px;display:none">
    Senha incorreta. Tente novamente.</span>
</div>

<!-- Painel real — oculto até senha correta -->
<div id="main-content" style="display:none">

<div class="palette-switch" role="tablist" aria-label="Escolher paleta">
  <button data-palette="forest">Forest</button>
  <button data-palette="dusk">Dusk</button>
  <button data-palette="cream" class="is-active">Cream</button>
</div>

<div class="container">
  <div class="header-bar">
    <div class="label">Delta Academy</div>
    <h1>Painel — glauco-teste</h1>
    <p>Seus módulos e aulas publicados</p>
  </div>

  <div class="section-label">MÓDULOS</div>

  <div class="modulo-card">
    <div class="modulo-head" onclick="toggleModulo(this)">
      <div class="modulo-head-left">
        <span class="modulo-title">IA para Executivos</span>
        <span class="modulo-meta">1 aula &middot; atualizado em 23/04/2026</span>
      </div>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="modulo-body">
      <div class="aula-row">
        <div class="aula-info">
          <span class="aula-num">01</span>
          <span class="aula-title">Introdução a Prompts</span>
        </div>
        <button class="copy-link-btn" onclick="copyLink(this, 'https://deltaacademy-ai.github.io/pages/glauco-teste/ia-para-executivos/tutorial-01-intro-prompts.html')">Copiar link</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <p><a href="https://deltaacademy.com.br">deltaacademy.com.br</a> &middot; Delta Academy &middot; 2026</p>
  </div>
</div>

</div><!-- /main-content -->

<script>
  const SENHA = "admin123";
  function checkPwd() {
    if (document.getElementById('pwd').value === SENHA) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    } else {
      document.getElementById('pwd-error').style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }

  function toggleModulo(head) {
    head.classList.toggle('open');
    head.nextElementSibling.classList.toggle('open');
  }

  function copyLink(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = 'Copiado \u2713';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copiar link';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  (function(){
    const KEY="delta-tut-palette";
    const saved=localStorage.getItem(KEY)||"cream";
    document.documentElement.setAttribute("data-palette",saved);
    const apply=(p)=>{
      document.documentElement.setAttribute("data-palette",p);
      localStorage.setItem(KEY,p);
      document.querySelectorAll(".palette-switch button").forEach(b=>b.classList.toggle("is-active",b.dataset.palette===p));
    };
    document.querySelectorAll(".palette-switch button").forEach(b=>b.addEventListener("click",()=>apply(b.dataset.palette)));
    apply(saved);
  })();
</script>
</body>
</html>
